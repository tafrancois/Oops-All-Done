<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#f5c96b"/>
      <stop offset="50%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d48c2a"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Rounded square background with warm gold gradient -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner glow -->
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>

  <!-- Tally marks — 4 vertical + 1 diagonal crossing (the classic "five") -->
  <g stroke="#5a2e4e" stroke-width="22" stroke-linecap="round" fill="none">
    <line x1="140" y1="165" x2="140" y2="355"/>
    <line x1="200" y1="165" x2="200" y2="355"/>
    <line x1="260" y1="165" x2="260" y2="355"/>
    <line x1="320" y1="165" x2="320" y2="355"/>
    <line x1="110" y1="340" x2="350" y2="180"/>
  </g>

  <!-- Decorative star sparkle -->
  <g transform="translate(395, 135)" fill="#5a2e4e">
    <path d="M0,-22 L6,-6 L22,0 L6,6 L0,22 L-6,6 L-22,0 L-6,-6 Z"/>
  </g>
</svg>
